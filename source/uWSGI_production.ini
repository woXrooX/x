[uwsgi]
socket = /run/uwsgi/woXrooX_x.sock

# Gives Nginx permission to access the socket
chmod-socket = 660
module = uWSGI:app
plugin = python3

# Main process that manages workers, auto-restarts crashed workers
master = true
processes = 4
threads = 2

# Log to file instead of terminal
logto = /var/log/uwsgi/woXrooX_x.log

# Cleans up the socket file when uWSGI stops
vacuum = true

# Plays nicely with systemd for clean shutdowns
die-on-term = true
